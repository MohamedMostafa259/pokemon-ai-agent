
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream gradio {
        server 127.0.0.1:7861;
    }

    server {
        listen 7860;
        server_name _;

        # Serve Gradio App
        location / {
            proxy_pass http://gradio;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
            proxy_connect_timeout 10s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 60;
            proxy_next_upstream_timeout 120s;
        }

        # Serve Showdown Client Static Files
        # All compiled assets (js/, data/, style/) live inside play.pokemonshowdown.com/
        # so the alias MUST point there — otherwise relative URLs in testclient.html break.
        location /client/ {
            alias /app/client/play.pokemonshowdown.com/;
            index testclient.html;
            try_files $uri $uri/ =404;
        }

        # Proxy Showdown Server WebSockets
        location /showdown/websocket {
            proxy_pass http://127.0.0.1:8000/showdown/websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
        }
        
        location /action.php {
            proxy_pass http://127.0.0.1:8000/action.php;
            proxy_set_header Host $host;
        }
    }
}
